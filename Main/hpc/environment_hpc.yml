# =============================================================================
# environment_hpc.yml -- conda base environment for the 1D-CNN MEA pipeline
# =============================================================================
#
# Base scientific stack for running the full contrastive optimization /search
# on davinci-1 (PBS). Covers: data augmentation, contrastive DataLoader, the
# RegNet-style 1D encoder, triplet-metric learning, HPO (skopt), and embedding
# evaluation (sklearn).
#
# IMPORTANT -- PyTorch is NOT listed here.
# It is installed AFTER this environment is created, by setup_env_davinci.sh,
# which picks the CPU wheel by default (or a CUDA wheel if you switch to GPU).
# Listing torch here would pull the conda-forge CPU-only build silently, which
# is wrong the moment you move to a GPU node.
#
# The env NAME is passed on the command line by setup_env_davinci.sh (-n), so
# it is intentionally NOT hard-coded here -- you choose it at setup time.
#
# Usage (always via setup_env_davinci.sh, never `conda env create` directly,
# because the torch + libstdc++ steps must run after the conda solve):
#   bash setup_env_davinci.sh --env-name <your_env_name>
#   conda activate <your_env_name>
#   python verify_env.py
# =============================================================================

channels:
  - conda-forge          # primary: up-to-date, consistent ABI
  - defaults             # fallback

dependencies:
  # -- Python interpreter ----------------------------------------------------
  - python=3.11          # stable, widely supported on HPC

  # -- core scientific stack -------------------------------------------------
  #    Pinned to the MINOR version: patch updates still apply, no silent
  #    ABI-breaking minor bumps.
  - numpy=1.26           # np.random.default_rng, np.histogram
  - scipy=1.13           # CubicSpline, gaussian_filter1d, find_peaks
  - matplotlib=3.9       # Agg backend (headless HPC), fill_between, scatter
  - scikit-learn=1.5     # KMeans, PCA, ARI, AMI

  # -- utilities -------------------------------------------------------------
  - tqdm>=4.65           # training-loop progress bars

  # -- the davinci-1 libstdc++ fix (baked in, not a separate manual step) -----
  #    davinci-1's system /lib64/libstdc++.so.6 predates the GCC the conda
  #    scipy binary was built against (missing GLIBCXX_3.4.26). Installing a
  #    newer libstdc++ INTO the env, plus the LD_LIBRARY_PATH activation hook
  #    that setup_env_davinci.sh writes, fixes the "GLIBCXX not found" import
  #    crash once and for all.
  - libstdcxx-ng
  - libgcc-ng

  # -- pip bridge ------------------------------------------------------------
  - pip

  - pip:
    # Hyperparameter optimisation (the search phases use skopt's gp_minimize)
    - scikit-optimize>=0.9,<0.11   # gp_minimize, Real, Integer, Categorical

    # Metric learning (imported by train.py; MUST come after torch is
    # installed, which setup_env_davinci.sh guarantees by installing torch
    # first and this pip block second).
    - pytorch-metric-learning>=2.3 # TripletMarginLoss, TripletMarginMiner,
                                   # AvgNonZeroReducer, CosineSimilarity,
                                   # LpDistance
